######################################################################
# Ritocco fine dello Z-offset (baby-stepping) + salvataggio
# ---------------------------------------------------------------------
# Ogni macro qui sotto compare come PULSANTE nel pannello "Macro" di
# Mainsail. Le macro con nome che inizia per "_" restano nascoste
# (sono helper interni).
#
# Convenzione:
#   DOWN -> nozzle piu' VICINO al piatto (primo layer piu' schiacciato)  [Z_ADJUST negativo]
#   UP   -> nozzle piu' LONTANO dal piatto (primo layer meno schiacciato) [Z_ADJUST positivo]
#
# Flusso d'uso:
#   1) ZOFFSET_GOTO_ZERO  -> nozzle a Z0 al centro (prova rapida col foglietto)
#      oppure usa i pulsanti dal vivo durante il primo layer di una stampa.
#   2) Ritocca con i pulsanti DOWN/UP (passi 0.05 / 0.10 / 0.25 mm).
#   3) ZOFFSET_APPLY -> fissa il ritocco nello z_offset del probe e riavvia.
#      (ZOFFSET_RESET annulla il ritocco live senza toccare lo z_offset salvato)
######################################################################

[gcode_macro _ZOFFSET_ECHO]
gcode:
    {% set go = printer.gcode_move.homing_origin.z|float %}
    { action_respond_info("Ritocco live Z = %.3f mm  ->  ZOFFSET_APPLY per fissarlo nello z_offset" % go) }

# --- Nozzle piu' VICINO al piatto (piu' schiacciato) ---------------------
[gcode_macro ZOFFSET_DOWN_0_05]
description: Nozzle -0.05 mm (piu' vicino al piatto)
gcode:
    SET_GCODE_OFFSET Z_ADJUST=-0.05 MOVE=1
    _ZOFFSET_ECHO

[gcode_macro ZOFFSET_DOWN_0_10]
description: Nozzle -0.10 mm (piu' vicino al piatto)
gcode:
    SET_GCODE_OFFSET Z_ADJUST=-0.10 MOVE=1
    _ZOFFSET_ECHO

[gcode_macro ZOFFSET_DOWN_0_25]
description: Nozzle -0.25 mm (piu' vicino al piatto)
gcode:
    SET_GCODE_OFFSET Z_ADJUST=-0.25 MOVE=1
    _ZOFFSET_ECHO

# --- Nozzle piu' LONTANO dal piatto (meno schiacciato) -------------------
[gcode_macro ZOFFSET_UP_0_05]
description: Nozzle +0.05 mm (piu' lontano dal piatto)
gcode:
    SET_GCODE_OFFSET Z_ADJUST=0.05 MOVE=1
    _ZOFFSET_ECHO

[gcode_macro ZOFFSET_UP_0_10]
description: Nozzle +0.10 mm (piu' lontano dal piatto)
gcode:
    SET_GCODE_OFFSET Z_ADJUST=0.10 MOVE=1
    _ZOFFSET_ECHO

[gcode_macro ZOFFSET_UP_0_25]
description: Nozzle +0.25 mm (piu' lontano dal piatto)
gcode:
    SET_GCODE_OFFSET Z_ADJUST=0.25 MOVE=1
    _ZOFFSET_ECHO

# --- Applica / Azzera ----------------------------------------------------
[gcode_macro ZOFFSET_APPLY]
description: Fissa il ritocco nello z_offset del probe e salva (RIAVVIA)
gcode:
    {% set go = printer.gcode_move.homing_origin.z|float %}
    {% if go|abs < 0.0005 %}
        { action_respond_info("Nessun ritocco da salvare: ritocco live = 0") }
    {% else %}
        { action_respond_info("Salvo variazione %.3f mm nello z_offset del probe..." % go) }
        Z_OFFSET_APPLY_PROBE
        SAVE_CONFIG
    {% endif %}

[gcode_macro ZOFFSET_RESET]
description: Azzera il ritocco live (non tocca lo z_offset salvato)
gcode:
    SET_GCODE_OFFSET Z=0 MOVE=1
    { action_respond_info("Ritocco live azzerato (z_offset salvato invariato)") }

# --- Helper: porta il nozzle a Z0 al centro per la prova del foglietto ----
[gcode_macro ZOFFSET_GOTO_ZERO]
description: Home + azzera mesh + vai al centro a Z0 (prova foglietto)
gcode:
    G28
    BED_MESH_CLEAR
    G90
    G1 X150 Y150 F3000
    G1 Z0 F300
    { action_respond_info("Nozzle a Z0 al centro: prova il foglietto, poi ritocca con DOWN/UP") }
