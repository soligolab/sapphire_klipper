######################################################################
# Test funzionale BLTouch prima dell'home Z
######################################################################
# Rileva un BLTouch scollegato o guasto PRIMA che l'asse Z si muova.
#
# Principio: un BLTouch sano cambia lo stato letto tra pin_down e pin_up;
# un sensore scollegato (pin flottante) legge sempre lo stesso stato.
# Se i due stati coincidono -> action_raise_error -> l'home viene abortito
# e il nozzle non tocca il piatto.
#
# NB: in Klipper il template Jinja di una macro viene renderizzato PRIMA
# di eseguire i comandi, quindi non si puo' leggere printer.probe.last_query
# nella stessa macro che ha appena chiamato QUERY_PROBE. Per questo il test
# e' spezzato su tre macro concatenate: ogni QUERY_PROBE viene eseguita
# completamente prima che la macro successiva venga renderizzata.
######################################################################

[gcode_macro _CHECK_BLTOUCH]
description: Verifica che il BLTouch risponda (rileva sensore scollegato) prima dell'home Z
gcode:
    BLTOUCH_DEBUG COMMAND=reset
    M400
    BLTOUCH_DEBUG COMMAND=pin_down
    G4 P300
    M400
    QUERY_PROBE
    M400
    _CHECK_BLTOUCH2

[gcode_macro _CHECK_BLTOUCH2]
gcode:
    # last_query e' ora aggiornato dalla QUERY_PROBE eseguita in _CHECK_BLTOUCH
    {% set down = printer.probe.last_query %}
    BLTOUCH_DEBUG COMMAND=pin_up
    G4 P300
    M400
    QUERY_PROBE
    M400
    _CHECK_BLTOUCH3 DOWN={down}

[gcode_macro _CHECK_BLTOUCH3]
gcode:
    {% set down = params.DOWN %}
    {% set up = printer.probe.last_query %}
    BLTOUCH_DEBUG COMMAND=reset
    RESPOND MSG="BLTouch check: down={down} up={up}"
    {% if (down|string) == (up|string) %}
        { action_raise_error("BLTouch non risponde (stato costante down=%s up=%s): sensore scollegato o guasto. HOME Z ANNULLATO per proteggere il nozzle." % (down, up)) }
    {% endif %}
